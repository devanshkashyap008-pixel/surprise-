<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Do You Love Me? ❤️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #ffe6eb;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            background: #ffffff;
            padding: 30px 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(255, 77, 121, 0.15);
            width: 90%;
            max-width: 360px;
            min-height: 380px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* Fixed Size Image Frame */
        .image-wrapper {
            width: 160px;
            height: 160px;
            margin-bottom: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        h2 {
            font-size: 1.6rem;
            color: #2c3e50;
            margin-bottom: 30px;
            font-weight: 700;
            line-height: 1.3;
        }

        .button-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            width: 100%;
            height: 50px;
            position: relative;
        }

        .btn {
            padding: 12px 30px;
            font-size: 1.1rem;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
        }

        .yes-btn {
            background-color: #ff4d79;
            color: white;
            box-shadow: 0 5px 15px rgba(255, 77, 109, 0.3);
            z-index: 5;
        }

        .no-btn {
            background-color: #f1f2f6;
            color: #57606f;
            position: absolute;
            z-index: 10;
            left: 55%;
            transition: left 0.1s ease-out, top 0.1s ease-out;
        }

        .result-container {
            display: none;
        }
    </style>
</head>
<body>

    <div class="container" id="questionBox">
        <div class="image-wrapper">
            <img id="mainImg" src="https://i.postimg.com/0246m4m3/bubu-ask.gif" alt="Bubu Dudu Ask">
        </div>
        <h2 id="mainQuestion">Do you love me?</h2>
        <div class="button-container">
            <button class="btn yes-btn" onclick="showLove()">Yes</button>
            <button class="btn no-btn" id="noBtn" onmouseover="dodge()" onclick="dodge()">No</button>
        </div>
    </div>

    <div class="container result-container" id="resultBox">
        <div class="image-wrapper">
            <img src="https://i.postimg.com/8cn6ND9G/bubu-happy.gif" alt="Bubu Dudu Happy">
        </div>
        <h2 style="color: #ff4d79; margin-bottom: 0;">I knew it! 🥰 ❤️</h2>
    </div>

    <script>
        const noBtn = document.getElementById('noBtn');
        const container = document.getElementById('questionBox');
        const mainImg = document.getElementById('mainImg');

        function dodge() {
            // Safe boundaries inside the card area
            const padding = 30;
            const maxW = container.clientWidth - noBtn.clientWidth - padding;
            const maxH = container.clientHeight - noBtn.clientHeight - padding;

            let randomX = Math.floor(Math.random() * maxW);
            let randomY = Math.floor(Math.random() * maxH);

            // Keep boundaries structured
            if (randomX < padding) randomX = padding;
            if (randomY < padding) randomY = padding;

            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
            
            // Change image to sad/shocked bear when dodging
            mainImg.src = "https://i.postimg.com/Nf73663y/bubu-sad.gif";
        }

        function showLove() {
            document.getElementById('questionBox').style.display = 'none';
            document.getElementById('resultBox').style.display = 'flex';
        }
    </script>
</body>
</html>
