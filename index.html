<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surprise For You ❤️</title>
    <style>
        body { 
            background: linear-gradient(to bottom, #ffe6e6, #ffb3b3); 
            text-align: center; 
            font-family: 'Arial', sans-serif; 
            padding-top: 100px;
            height: 100vh;
            margin: 0;
        }
        h1 { color: #b30000; font-size: 2.5rem; animation: pulse 1.5s infinite; }
        p { font-size: 1.3rem; color: #4a4a4a; font-style: italic; }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <h1>Hey Cutiee! Appke liye ek surprise... 🥰</h1>
    <p>"Ek aisa surprise toh hum bhi deserve krte hai..." ❤️✨</p>
</body>
</html>
