<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Do You Love Me? ❤️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #ffe6eb 0%, #ffd1dc 100%);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            background: #ffffff;
            padding: 40px 25px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(255, 77, 109, 0.12);
            width: 85%;
            max-width: 350px;
            min-height: 340px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        /* Pure CSS Styled Interactive Vector Icon Frame */
        .icon-box {
            width: 100px;
            height: 100px;
            background: #fff0f3;
            border-radius: 50%;
            margin-bottom: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3.2rem;
            box-shadow: inset 0 4px 10px rgba(255, 77, 109, 0.05);
            animation: floatGlow 2s infinite ease-in-out;
        }

        h2 {
            font-size: 1.6rem;
            color: #2c3e50;
            margin-bottom: 35px;
            font-weight: 700;
            line-height: 1.3;
        }

        .button-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            width: 100%;
            height: 50px;
            position: relative;
        }

        .btn {
            padding: 12px 28px;
            font-size: 1.05rem;
            font-weight: 600;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.1s ease, background 0.3s ease;
        }

        .yes-btn {
            background: linear-gradient(135deg, #ff4d79 0%, #ff2a5f 100%);
            color: white;
            box-shadow: 0 6px 18px rgba(255, 77, 109, 0.3);
            z-index: 5;
        }

        .yes-btn:active {
            transform: scale(0.95);
        }

        .no-btn {
            background-color: #f1f2f6;
            color: #57606f;
            position: absolute;
            z-index: 10;
            left: 55%;
            transition: left 0.15s cubic-bezier(0.25, 1, 0.5, 1), top 0.15s cubic-bezier(0.25, 1, 0.5, 1);
            border: 1px solid #e4e7eb;
        }

        .result-container {
            display: none;
        }

        /* Success Stage Style Variations */
        .pulse-heart {
            font-size: 3.8rem;
            animation: heartPulse 0.8s infinite alternate cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes floatGlow {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        @keyframes heartPulse {
            0% { transform: scale(1); filter: drop-shadow(0 0 2px rgba(255,77,109,0.4)); }
            100% { transform: scale(1.18); filter: drop-shadow(0 0 12px rgba(255,77,109,0.6)); }
        }
    </style>
</head>
<body>

    <div class="container" id="questionBox">
        <div class="icon-box" id="displayEmoji">🐼</div>
        <h2 id="mainQuestion">Do you love me?</h2>
        <div class="button-container">
            <button class="btn yes-btn" onclick="showLove()">Yes</button>
            <button class="btn no-btn" id="noBtn" onmouseover="dodgeButton()" onclick="dodgeButton()">No</button>
        </div>
    </div>

    <div class="container result-container" id="resultBox">
        <div class="icon-box pulse-heart" style="background: none; box-shadow: none;">💖</div>
        <h2 style="color: #ff4d79; margin-bottom: 0; font-size: 1.8rem;">I knew it! 🥰 ✨</h2>
    </div>

    <script>
        const noBtn = document.getElementById('noBtn');
        const container = document.getElementById('questionBox');
        const displayEmoji = document.getElementById('displayEmoji');
        
        // Dynamic Dodge Action Core
        function dodgeButton() {
            const padding = 25;
            // Strict alignment math within the box card structure
            const maxW = container.clientWidth - noBtn.clientWidth - padding;
            const maxH = container.clientHeight - noBtn.clientHeight - padding;

            let randomX = Math.floor(Math.random() * maxW);
            let randomY = Math.floor(Math.random() * maxH);

            // Buffer corrections
            if (randomX < padding) randomX = padding;
            if (randomY < padding) randomY = padding;

            noBtn.style.left = randomX + 'px';
            noBtn.style.top = randomY + 'px';
            
            // Interaction feedback via code emoji update
            displayEmoji.innerText = '🫣';
        }

        function showLove() {
            document.getElementById('questionBox').style.display = 'none';
            document.getElementById('resultBox').style.display = 'flex';
        }
    </script>
</body>
</html>
